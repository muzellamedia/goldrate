<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Preview Tool</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ddd;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.editor{
  width:40%;
}

textarea{
  width:100%;
  height:90vh;
  font-family:monospace;
  font-size:14px;
  padding:10px;
}

.preview{
  width:60%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

canvas{
  background:#0a6b2d;
  border:2px solid #000;
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT: CODE BOX -->
  <div class="editor">
    <textarea id="codeBox">
// ഇവിടെ നിങ്ങളുടെ template code paste ചെയ്യുക
    </textarea>
  </div>

  <!-- RIGHT: PREVIEW -->
  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

</div>

<script>

// =====================
// A4 300 DPI SIZE
// =====================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// A4 @300 DPI = 2480 x 3508 px
canvas.width = 2480;
canvas.height = 3508;


// =====================
// HELPER FUNCTIONS
// =====================
function roundRect(ctx, x, y, w, h, r, fill, stroke){
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;

  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();

  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function formatRateValue(val){
  return Number(val).toLocaleString("en-IN");
}

// DEMO VALUES
let rate22k_1g = 15000;
let rate22k_1p = 120000;


// =====================
// LIVE RENDER
// =====================
const codeBox = document.getElementById("codeBox");

codeBox.addEventListener("input", render);

function render(){

  // clear canvas
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background
  ctx.fillStyle = "#0a6b2d";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  try{
    // run user code
    new Function("ctx","canvas", codeBox.value)(ctx, canvas);
  }catch(e){
    console.log("Error:", e);
  }
}

// INITIAL LOAD
render();

</script>

</body>
</html>
